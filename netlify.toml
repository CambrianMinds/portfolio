[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
X-Frame-Options = "SAMEORIGIN"
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/tmoc"
  to = "/tmoc-built/index.html"
  status = 301
